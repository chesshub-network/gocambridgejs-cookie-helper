<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Cookie Helper</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body { font-family: system-ui, sans-serif; padding: 1rem; background:#0b0b0f; color:#e5e7eb; }
    textarea { width:100%; height:200px; background:#020617; color:#e5e7eb; border:1px solid #374151; border-radius:6px; padding:0.5rem; }
    button { padding:0.5rem 1rem; border-radius:999px; border:none; background:#3b82f6; color:white; font-weight:600; }
    code { background:#111827; padding:0.15rem 0.3rem; border-radius:4px; }
  </style>
</head>
<body>
  <h1>Cookie Helper</h1>
  <p>Zeigt <code>document.cookie</code> der aktuellen Seite an (funktioniert nicht bei HttpOnly‑Cookies).</p>

  <button id="readBtn">Cookies auslesen</button>

  <h2>document.cookie</h2>
  <textarea id="output" readonly></textarea>

  <h2>Bookmarklet</h2>
  <p>Dieses Lesezeichen kannst du im Browser anlegen:</p>
  <pre>javascript:alert(document.cookie);</pre>

  <script>
    document.getElementById("readBtn").onclick = () => {
      document.getElementById("output").value = document.cookie || "(keine lesbaren Cookies oder nur HttpOnly)";
    };
  </script>
</body>
</html>
