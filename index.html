<!DOCTYPE html>
<html lang="de" class="dark">
<head>
  <meta charset="UTF-8">
  <title>Gocambridge Web – Cambridge Login Flow</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>

  <style>
    body { background:#0b0b0f; color:#e5e7eb; }
    input, select { background:#111827; border:1px solid #374151; border-radius:6px; padding:0.5rem; }
    table { border-color:#374151; }
  </style>
</head>
<body class="p-4 space-y-6">

  <h1 class="text-xl font-bold flex items-center gap-2">
    <i data-lucide="log-in"></i>
    Gocambridge Web – Cambridge Login
  </h1>

  <!-- LOGIN SECTION -->
  <section id="loginSection" class="space-y-3 max-w-xl border border-gray-800 p-4 rounded-lg">
    <h2 class="font-semibold text-sm">Anmeldung</h2>
    <p class="text-xs text-gray-400">
      Dieser Flow funktioniert wie OAuth: Du meldest dich bei Cambridge One an, kehrst zurück und die App ist automatisch authentifiziert.
    </p>

    <button id="loginBtn"
            class="px-4 py-2 bg-blue-600 rounded-full text-xs font-semibold flex items-center gap-2">
      <i data-lucide="external-link"></i>
      Mit Cambridge One anmelden
    </button>

    <button id="continueBtn"
            class="px-4 py-2 bg-emerald-600 rounded-full text-xs font-semibold flex items-center gap-2 opacity-30 pointer-events-none">
      <i data-lucide="check-circle"></i>
      Weiter zur App
    </button>

    <p id="loginStatus" class="text-xs text-gray-400"></p>
  </section>

  <!-- APP SECTION -->
  <section id="appSection" class="space-y-4 opacity-30 pointer-events-none">
    <h2 class="font-semibold text-sm">App</h2>

    <div class="space-y-2 max-w-xl">
      <label class="text-xs text-gray-400">Cambridge One URL</label>
      <input id="url" class="w-full text-xs"
             placeholder="https://www.cambridgeone.org/nlp/apigateway/org_.../class/.../product/...">
      <button id="startBtn"
              class="px-4 py-2 bg-blue-600 rounded-full text-xs font-semibold">
        Start
      </button>
      <div id="status" class="text-xs text-gray-400"></div>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-3 mt-4">
      <div>
        <label class="text-xs text-gray-400">Unit</label>
        <select id="unitSelect" class="w-full text-xs" disabled></select>
      </div>
      <div>
        <label class="text-xs text-gray-400">Section</label>
        <select id="sectionSelect" class="w-full text-xs" disabled></select>
      </div>
      <div>
        <label class="text-xs text-gray-400">Lesson</label>
        <select id="lessonSelect" class="w-full text-xs" disabled></select>
      </div>
    </div>

    <div class="mt-4">
      <table id="answersTable" class="w-full hidden border text-xs">
        <thead>
          <tr class="bg-gray-800">
            <th class="border p-2 w-10">#</th>
            <th class="border p-2">Correct Answer</th>
          </tr>
        </thead>
        <tbody id="answersBody"></tbody>
      </table>
    </div>

    <pre id="errorBox"
         class="hidden mt-3 p-3 bg-red-900 text-red-200 rounded text-[10px] max-w-4xl"></pre>
  </section>

  <script>
    lucide.createIcons();

    /* ---------------- Cambridge Login Simulation ---------------- */

    const loginBtn = document.getElementById("loginBtn");
    const continueBtn = document.getElementById("continueBtn");
    const loginStatus = document.getElementById("loginStatus");
    const appSection = document.getElementById("appSection");

    loginBtn.onclick = () => {
      window.open("https://www.cambridgeone.org", "_blank");
      loginStatus.textContent = "Bitte im neuen Tab einloggen. Danach hier zurückkommen.";
      continueBtn.style.opacity = "1";
      continueBtn.style.pointerEvents = "auto";
    };

    continueBtn.onclick = () => {
      loginStatus.textContent = "Wenn du eingeloggt bist, ist die App jetzt authentifiziert.";
      appSection.style.opacity = "1";
      appSection.style.pointerEvents = "auto";
    };

    /* ---------------- Cambridge API Logic ---------------- */

    const BASE_CAMBRIDGE_URL = "https://www.cambridgeone.org/nlp/apigateway/%s/product/%s/";
    const LESSON_URL = "https://content.cambridgeone.org/cup1/products/%s/2/assets/ext-cup-xapiscoreable/%s/data.js";
    const APP_VERSION_HEADER = "cambridgeone-app-version";
    const APP_VERSION = "v2";
    const AJAX_DATA = "ajaxData";

    class Cambridge {
      constructor(org, product) {
        this.baseUrl = BASE_CAMBRIDGE_URL.replace("%s", org).replace("%s", product);
        this.headers = { [APP_VERSION_HEADER]: APP_VERSION };
      }

      async getUnits(classId) {
        const url = this.baseUrl + classId;
        const res = await fetch(url, {
          method: "GET",
          headers: this.headers,
          credentials: "include"
        });
        if (!res.ok) throw new Error("HTTP " + res.status);
        return await res.json();
      }

      async getLessonResponse(productCode, lessonId) {
        const url = LESSON_URL.replace("%s", productCode).replace("%s", lessonId);
        const res = await fetch(url, {
          method: "GET",
          headers: this.headers,
          credentials: "include"
        });
        if (!res.ok) throw new Error("HTTP " + res.status);
        const body = await res.text();
        (function(){ eval(body); })();
        const data = window[AJAX_DATA];
        if (!data) throw new Error("ajaxData not found");

        const jsonStr = JSON.stringify(data);
        const regex = /<value>(.*?)<\/value>/g;
        const results = [];
        let m;
        while ((m = regex.exec(jsonStr)) !== null) results.push(m[1]);

        return results;
      }
    }

    /* ---------------- UI Logic ---------------- */

    const urlEl = document.getElementById("url");
    const startBtn = document.getElementById("startBtn");
    const statusEl = document.getElementById("status");
    const unitSelect = document.getElementById("unitSelect");
    const sectionSelect = document.getElementById("sectionSelect");
    const lessonSelect = document.getElementById("lessonSelect");
    const answersTable = document.getElementById("answersTable");
    const answersBody = document.getElementById("answersBody");
    const errorBox = document.getElementById("errorBox");

    let client = null;
    let units = null;
    let org = "", product = "", classId = "";

    function setStatus(msg){ statusEl.textContent = msg || ""; }
    function showError(err){
      errorBox.classList.remove("hidden");
      errorBox.textContent = String(err);
    }
    function clearError(){
      errorBox.classList.add("hidden");
      errorBox.textContent = "";
    }

    function parseUrl(url){
      const m = /([^/]+)\/class\/([^/]+)\/product\/([^/]+)/.exec(url);
      if (!m) throw new Error("Invalid URL");
      return { org:m[1], classId:m[2], product:m[3] };
    }

    function fillSelect(sel, items, exitText){
      sel.innerHTML = "";
      items.forEach((x,i)=>{
        const opt = document.createElement("option");
        opt.value = i;
        opt.textContent = x;
        sel.appendChild(opt);
      });
      const opt = document.createElement("option");
      opt.value = items.length;
      opt.textContent = exitText;
      sel.appendChild(opt);
      sel.disabled = false;
      return items.length;
    }

    startBtn.onclick = async () => {
      clearError();
      setStatus("Lade...");

      try {
        const parsed = parseUrl(urlEl.value.trim());
        org = parsed.org;
        product = parsed.product;
        classId = parsed.classId;

        client = new Cambridge(org, product);
        units = await client.getUnits(classId);

        const unitNames = units.toc.result.map(u => u.name);
        const exitIndex = fillSelect(unitSelect, unitNames, "Exit");

        sectionSelect.innerHTML = "";
        sectionSelect.disabled = true;
        lessonSelect.innerHTML = "";
        lessonSelect.disabled = true;
        answersTable.classList.add("hidden");
        answersBody.innerHTML = "";

        unitSelect.onchange = () => {
          if (parseInt(unitSelect.value,10) === exitIndex) {
            setStatus("Beendet.");
            return;
          }
          loadSections(parseInt(unitSelect.value,10));
        };

        setStatus("Units geladen.");
      } catch(e){
        showError(e);
        setStatus("Fehler.");
      }
    };

    function loadSections(unitIndex){
      const sections = units.toc.result[unitIndex].items.map(s=>s.name);
      const backIndex = fillSelect(sectionSelect, sections, "Zurück");

      lessonSelect.innerHTML = "";
      lessonSelect.disabled = true;
      answersTable.classList.add("hidden");
      answersBody.innerHTML = "";

      sectionSelect.onchange = () => {
        if (parseInt(sectionSelect.value,10) === backIndex) {
          sectionSelect.innerHTML = "";
          sectionSelect.disabled = true;
          lessonSelect.innerHTML = "";
          lessonSelect.disabled = true;
          answersTable.classList.add("hidden");
          answersBody.innerHTML = "";
          setStatus("Bitte Unit neu wählen.");
          return;
        }
        loadLessons(unitIndex, parseInt(sectionSelect.value,10));
      };
    }

    function loadLessons(unitIndex, sectionIndex){
      const lessons = units.toc.result[unitIndex].items[sectionIndex].items.map(l=>l.name);
      const backIndex = fillSelect(lessonSelect, lessons, "Zurück");

      answersTable.classList.add("hidden");
      answersBody.innerHTML = "";

      lessonSelect.onchange = () => {
        if (parseInt(lessonSelect.value,10) === backIndex) {
          answersTable.classList.add("hidden");
          answersBody.innerHTML = "";
          setStatus("Bitte Section neu wählen.");
          return;
        }
        showSolution(unitIndex, sectionIndex, parseInt(lessonSelect.value,10));
      };
    }

    async function showSolution(unitIndex, sectionIndex, lessonIndex){
      clearError();
      setStatus("Lade Lösungen...");

      const item = units.toc.result[unitIndex].items[sectionIndex].items[lessonIndex];
      const code = item["item-code"].split("/").pop();

      try {
        const answers = await client.getLessonResponse(product, code);
        answersBody.innerHTML = "";
        answers.forEach((ans,i)=>{
          const tr = document.createElement("tr");
          tr.innerHTML = `
            <td class="border p-2 text-center">${i+1}</td>
            <td class="border p-2">${ans}</td>
          `;
          answersBody.appendChild(tr);
        });
        answersTable.classList.remove("hidden");
        setStatus("Fertig.");
      } catch(e){
        showError(e);
        setStatus("Fehler beim Laden der Lösungen.");
      }
    }
  </script>
</body>
</html>
